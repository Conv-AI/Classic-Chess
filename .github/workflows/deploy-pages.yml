name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Resolve Vite base path for this Pages site
        shell: bash
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -z "$BASE_PATH" ] || [ "$BASE_PATH" = "/" ]; then
            VITE_BASE_PATH="/"
          else
            VITE_BASE_PATH="${BASE_PATH%/}/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH" >> "$GITHUB_ENV"
          echo "Using Vite base path: $VITE_BASE_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Load frontend environment
        shell: bash
        run: |
          if [ -f .env ]; then
            grep -E '^VITE_' .env >> "$GITHUB_ENV"
          fi
          if [ -z "${VITE_CONVAI_API_KEY:-}" ] && ! grep -q '^VITE_CONVAI_API_KEY=.' .env 2>/dev/null; then
            echo "VITE_CONVAI_API_KEY is missing or empty"
            exit 1
          fi

      - name: Build
        run: npm run build -- --base="$VITE_BASE_PATH"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
